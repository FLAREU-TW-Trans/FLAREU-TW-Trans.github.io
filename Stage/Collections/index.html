<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>舞台收藏與推薦排行榜</title>
    <link rel="icon" href="https://flareu-tw-trans.github.io/images/favicon.png" type="image/png">
    
    <style>
        :root { --bg-color: #111111; --card-bg: #1a1a1a; --text-color: #ffffff; --text-muted: #aaaaaa;
            --burgundy: #a63a50; --burgundy-hover: #8c2f42; --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32; }
        body { margin: 0; background: var(--bg-color); color: var(--text-color);
            font-family: Arial, "Noto Sans TC", sans-serif; padding: 20px; padding-bottom: 60px; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2rem; letter-spacing: 2px; }
        .top-menu{ display:flex; justify-content:center; gap:10px; margin-bottom:25px; flex-wrap:wrap; }

        .nav-btn{ background:#2b2b2b; color:#fff; border:none; border-radius:20px; padding:10px 20px;
            text-decoration:none; cursor:pointer; font-weight:600; font-size:14px; transition:.2s; }
        .nav-btn:hover{ background:#3d3d3d; }
        .nav-btn.active{ background:var(--burgundy); }

        #ranking-btn.active{ background:#a63a50; }
        #favorite-btn.active{ background:#d49a00; }

        .category-menu button[data-category="group"].active{ background:#a63a50; }
        .category-menu button[data-category="liyu"].active{ background:#6eb7e8; color:#fff; }
        .category-menu button[data-category="woojin"].active{ background:#b79adf; color:#fff; }

        /* ===== 收藏區 ===== */
        #favorites-container{ width:100%; max-width:1600px; margin:0 auto; display:grid; gap:20px; grid-template-columns:1fr; }

        /* 平板 */
        @media (min-width:768px){ #favorites-container{ grid-template-columns:repeat(2,1fr); }}
        /* 一般電腦 */
        @media (min-width:1200px){ #favorites-container{ grid-template-columns:repeat(3,1fr); }}
        /* 大螢幕 */
        @media (min-width:1600px){ #favorites-container{ grid-template-columns:repeat(4,1fr); }}

        /* 收藏縮圖固定橫向比例 */
        #favorites-container .thumb-wrapper{ aspect-ratio:16 / 9; height:auto; }
        #favorites-container .thumb-wrapper img{ width:100%; height:100%; object-fit:cover; }
        #favorites-container .video-info{ padding:12px; }
        #favorites-container .video-title{ height:auto; min-height:40px; font-size:14px; }      
        #favorites-container .thumb-wrapper{ aspect-ratio:16 / 9; height:auto; }
        #favorites-container .thumb-wrapper img{ width:100%; height:100%; object-fit:cover; }
        #favorites-container .video-title{ height:auto; font-size:14px; }
        #favorites-container .video-info{ padding:12px; }

        /* 分類切換導覽列 */
        .category-menu { display: flex; gap: 10px; justify-content: center; margin-bottom: 40px; }
        .category-menu button { border: none; border-radius: 20px; padding: 10px 20px; cursor: pointer;
            background: #2b2b2b; color: #ffffff; font-weight: 600; font-size: 14px; transition: all 0.2s ease; }
        .category-menu button.active{ color:#fff; }
        .category-menu button:hover:not(.active) { background: #3d3d3d; }

        /* 排行榜主容器 */
        .ranking-container { max-width: 1000px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px;}

        /* 頒獎台視覺排版 */
        .podium-section {display: grid; grid-template-columns: 1fr 1.2fr 1fr; gap: 20px; align-items: end; margin-bottom: 20px; }

        /* 響應式：手機版改為垂直排列 */
        @media (max-width: 768px) {
            .podium-section { grid-template-columns: 1fr; align-items: stretch; }
            /* 手機版強制依 1 -> 2 -> 3 順序顯示 */
            .podium-card.rank-1 { order: 1; }
            .podium-card.rank-2 { order: 2; }
            .podium-card.rank-3 { order: 3; }
        }

        /* 卡片基礎樣式 */
        .podium-card { background: var(--card-bg); border-radius: 16px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.3s ease; position: relative; border: 1px solid rgba(255,255,255,0.05);}
        .podium-card:hover { transform: translateY(-5px); }

        /* 透過 CSS 讓第一名最大、依序遞減 */
        .rank-1 { border: 2px solid var(--gold); box-shadow: 0 8px 25px rgba(255, 215, 0, 0.15); }
        .rank-1 .thumb-wrapper { height: 220px; }
        .rank-1 .rank-badge { background: var(--gold); color: #000; font-size: 24px; width: 45px; height: 45px; }
        .rank-1 .video-title { font-size: 18px; font-weight: 700; }

        .rank-2 { border: 1px solid var(--silver); }
        .rank-2 .thumb-wrapper { height: 18px; height: 180px; }
        .rank-2 .rank-badge { background: var(--silver); color: #000; }

        .rank-3 { border: 1px solid var(--bronze); }
        .rank-3 .thumb-wrapper { height: 160px; }
        .rank-3 .rank-badge { background: var(--bronze); color: #fff; }

        /* 影片縮圖容器 */
        .thumb-wrapper { position: relative; width: 100%; background: #000; display: block; cursor: pointer;}
        .thumb-wrapper img { width: 100%; height: 100%; object-fit: cover;}

        /* 名次標籤 */
        .rank-badge { position: absolute; top: 12px; left: 12px; width: 35px; height: 35px; border-radius: 50%; display: flex; 
            align-items: center; justify-content: center; font-weight: 800; font-size: 18px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 2; }

        /* 文字內容區 */
        .video-info { padding: 16px; text-align: left;}
        .video-title { font-size: 15px; font-weight: 600; margin: 0 0 10px 0; line-height: 1.4; display: -webkit-box;
            -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 42px; }
        .count-badge { display: inline-block; background: rgba(166, 58, 80, 0.15); color: #ff8a9e; padding: 4px 12px;
            border-radius: 12px; font-size: 13px; font-weight: 700; border: 1px solid rgba(166, 58, 80, 0.3); }
        .no-data { text-align: center; padding: 4px 0; color: var(--text-muted); font-size: 15px; grid-column: 1 / -1; }
    </style>
</head>

            renderRankings(); // 只要 Firebase 資料一變，立刻重新渲染

    // 渲染排行榜主邏輯
    window.renderRankings = function() {
        const podiumArea = document.getElementById('podium-area');
        const categoryData = window.rawRankingData[window.currentCategory];

        if (!categoryData) {
            podiumArea.innerHTML = '<div class="no-data">該分類目前尚無推薦數據</div>';
            return;
        }

        let items = [];
        Object.keys(categoryData).forEach(videoDbId => {
            items.push({
                videoDbId: videoDbId,
                title: categoryData[videoDbId].title || '未命名舞台',
                clickCount: categoryData[videoDbId].clickCount || 0,
                ytId: categoryData[videoDbId].ytId || ''
            });
        });

        items.sort((a, b) => b.clickCount - a.clickCount);
        let topThree = items.slice(0, 3);

        if (topThree.length === 0) {
            podiumArea.innerHTML = '<div class="no-data">該分類目前尚無推薦數據</div>';
            return;
        }

        let displayOrder = [];
        if (window.innerWidth > 768) {
            if (topThree[1]) displayOrder.push({ item: topThree[1], rank: 2 });
            if (topThree[0]) displayOrder.push({ item: topThree[0], rank: 1 });
            if (topThree[2]) displayOrder.push({ item: topThree[2], rank: 3 });
        } else {
            topThree.forEach((item, index) => {
                displayOrder.push({ item: item, rank: index + 1 });
            });
        }

        podiumArea.innerHTML = '';
        displayOrder.forEach(slot => {
            const video = slot.item;
            const rank = slot.rank;
            const dbId = video.videoDbId;
            
            // 1. 取得對照表自訂內容
            const customConfig = customVideoMapping[dbId] || {};
            
            // 2. 判斷連結：如果有自訂連結就用自訂的，沒有的話預設回首頁
            const targetLink = customConfig.link || 'https://flareu-tw-trans.github.io/';

            // 3. 判斷縮圖：優先使用手動添加的圖片網址。如果沒有，再自動抓 YouTube 縮圖
            let thumbUrl = '';
            if (customConfig.customThumb && customConfig.customThumb.trim() !== '') {
                thumbUrl = customConfig.customThumb;
            } else {
                const youtubeId = video.ytId || 'Mu9EwQfmMZU';
                thumbUrl = `https://img.youtube.com/vi/${youtubeId}/mqdefault.jpg`;
            }

            // 4. 生成具有 <a> 標籤跳轉功能的 HTML 卡片
            const cardHtml = `
                <div class="podium-card rank-${rank}">
                    <a href="${targetLink}" target="_blank" rel="noopener noreferrer" class="thumb-wrapper">
                        <div class="rank-badge">${rank}</div>
                        <img src="${thumbUrl}" alt="舞台縮圖" onerror="this.src='https://flareu-tw-trans.github.io/images/favicon.png';">
                    </a>
                    <div class="video-info">
                        <h3 class="video-title">${video.title}</h3>
                        <span class="count-badge">❤️ ${video.clickCount} 次推薦</span>
                    </div>
                </div>
            `;
            podiumArea.innerHTML += cardHtml;
        });
    };

    window.switchCategory = function(category, btnElement) {

        window.currentCategory = category;

        document.querySelectorAll('.category-menu button')
            .forEach(btn => btn.classList.remove('active'));

        btnElement.classList.add('active');

        const favoritesVisible = document.getElementById('favorites-container').style.display === 'grid';

        if(favoritesVisible){
            renderFavorites();
        }else{
            renderRankings();
        }
    };

    // 監聽視窗大小改變，自動調整電腦版/手機版的頒獎台左右順序
    window.addEventListener('resize', () => {
        if (window.rawRankingData && Object.keys(window.rawRankingData).length > 0) {
            renderRankings();
        }
    });

    //收藏
    window.showRanking = function(){

        document.getElementById('ranking-area').style.display='flex';

        document.getElementById('favorites-container').style.display='none';

        document.getElementById('ranking-btn').classList.add('active');
        document.getElementById('favorite-btn').classList.remove('active');
    }

    window.showFavorites = function(){

        document.getElementById('ranking-area').style.display='none';
        document.getElementById('favorites-container').style.display='grid';

        document.getElementById('favorite-btn').classList.add('active');
        document.getElementById('ranking-btn').classList.remove('active');

        renderFavorites();
    }

    function getCategory(videoId){

        if(!videoId){
            return 'group';
        }

        if(videoId.includes('liyu')){
            return 'liyu';
        }

        if(videoId.includes('woojin')){
            return 'woojin';
        }

        return 'group';
    }
    
    function renderFavorites(){

        const container = document.getElementById('favorites-container');

        const allFavorites = JSON.parse(
            localStorage.getItem('favoriteVideos') || '[]'
        );

        const favorites = allFavorites.filter(item =>
            getCategory(item.videoDbId) === window.currentCategory
        );

        if(favorites.length===0){
            container.innerHTML=
            `<div class="no-data">
                尚未收藏任何影片
             </div>`;
            return;
        }

        container.innerHTML='';

        favorites.forEach(video=>{

            const config = customVideoMapping[video.videoDbId] || {};

            const pageUrl =
                config.link ||
                'https://flareu-tw-trans.github.io/';

            const thumbUrl =
                config.customThumb ||
                `https://img.youtube.com/vi/${video.ytId}/mqdefault.jpg`;

            const card=`
            <div class="podium-card">
                <a href="${pageUrl}"
                   target="_blank"
                   class="thumb-wrapper">

                    <img src="${thumbUrl}"
                         alt="${video.title}"
                         onerror="this.src='https://flareu-tw-trans.github.io/images/favicon.png';">
                </a>

                <div class="video-info">
                    <h3 class="video-title">
                        ${video.title}
                    </h3>

                    <span class="count-badge">
                        ⭐ 已收藏
                    </span>
                </div>
            </div>
            `;
            container.innerHTML += card;
        });
    }
</script>
</body>
</html>
