<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>優化版 - 上下可調比例字幕播放器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            /* 允許按鈕和字幕點擊，但防止拖曳時選取到干擾文字 */
            user-select: none; 
            -webkit-user-select: none;
        }

        /* 上半邊：影片區塊 */
        .video-box {
            height: 45vh; /* 稍微縮小初始高度 */
            min-height: 100px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 【優化】加大感應範圍的分隔調整軸 */
        .resizer-container {
            height: 16px; /* 加大物理碰撞區，手機才好按 */
            background-color: #121212;
            cursor: ns-resize;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 99;
            touch-action: none; /* 防止手機瀏覽器預設的捲動干擾 */
        }

        .resizer-line {
            width: 40px;
            height: 4px;
            background-color: #555;
            border-radius: 2px;
            transition: background-color 0.2s, width 0.2s;
        }

        .resizer-container:hover .resizer-line, 
        .resizer-container.dragging .resizer-line {
            background-color: #ff9800; /* 觸發時變橘色 */
            width: 80px; /* 變長提示正在拉動 */
        }

        /* 下半邊：字幕與控制區容器 */
        .bottom-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #181818;
            overflow: hidden;
            min-height: 150px;
        }

        /* 控制面板 */
        .control-panel {
            background-color: #222;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap; /* 讓手機版會自動換行不塞爆 */
            gap: 10px;
            border-bottom: 1px solid #333;
        }

        .btn-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 14px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #444;
        }

        .btn-main {
            background-color: #ff9800;
            color: black;
            font-weight: bold;
        }

        .btn-main:hover {
            background-color: #e68a00;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.1rem;
            min-width: 75px;
            text-align: center;
        }

        .font-label {
            font-size: 0.85rem;
            color: #aaa;
            margin-left: 5px;
        }

        /* 字幕捲動區塊 */
        .lyrics-box {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
            padding: 20vh 20px; 
        }

        .lyrics-box::-webkit-scrollbar {
            width: 6px;
        }
        .lyrics-box::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* 【優化】單行字幕樣式，開放點擊 */
        .lyric-line {
            /* 透過 CSS 變數動態調整字體大小，預設為 1.3rem */
            font-size: var(--lyric-font-size, 1.3rem);
            line-height: 2.2;
            padding: 12px 0;
            text-align: center;
            color: #555;
            transition: color 0.2s, transform 0.2s, font-size 0.2s;
            transform: scale(0.95);
            opacity: 0.4;
            cursor: pointer; /* 提示可以點擊 */
            user-select: text; /* 允許個別複製字幕 */
        }

        .lyric-line:hover {
            color: #aaa;
            opacity: 0.8;
        }

        /* 當前字幕高亮 */
        .lyric-line.active {
            color: #ff9800;
            font-size: calc(var(--lyric-font-size, 1.3rem) * 1.25); /* 按比例放大 */
            font-weight: bold;
            transform: scale(1);
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="video-box" id="videoBox">
        <iframe src="https://example.com/embed/video" allowfullscreen></iframe>
    </div>

    <div class="resizer-container" id="dragAxis">
        <div class="resizer-line"></div>
    </div>

    <div class="bottom-container">
        <div class="control-panel">
            <div class="btn-group">
                <button class="btn" id="btnMinus">- 1 秒</button>
                <button class="btn btn-main" id="btnPlayPause">播放字幕</button>
                <button class="btn" id="btnPlus">+ 1 秒</button>
            </div>
            
            <div class="time-display" id="timeDisplay">00:00.0</div>
            <button class="btn" id="btnReset">重設</button>

            <div class="btn-group">
                <span class="font-label">字體：</span>
                <button class="btn" id="btnFontDown">A-</button>
                <button class="btn" id="btnFontUp">A+</button>
            </div>
        </div>

        <div class="lyrics-box" id="lyricsContainer">
            </div>
    </div>

    <script>
        // ==========================================
        // 功能一：優化版拖曳調整（支援滑鼠與手機觸控）
        // ==========================================
        const videoBox = document.getElementById('videoBox');
        const dragAxis = document.getElementById('dragAxis');

        // 滑鼠事件
        dragAxis.addEventListener('mousedown', function(e) {
            startResize();
            document.addEventListener('mousemove', resizeUpdate);
            document.addEventListener('mouseup', resizeStop);
        });

        // 手機觸控事件
        dragAxis.addEventListener('touchstart', function(e) {
            startResize();
            document.addEventListener('touchmove', resizeUpdateTouch, { passive: false });
            document.addEventListener('touchend', resizeStopTouch);
        });

        function startResize() {
            dragAxis.classList.add('dragging');
        }

        function resizeUpdate(e) {
            let newHeight = (e.clientY / window.innerHeight) * 100;
            if (newHeight > 15 && newHeight < 85) videoBox.style.height = newHeight + 'vh';
        }

        function resizeUpdateTouch(e) {
            e.preventDefault(); // 防止手機畫面跟著一起捲動
            let touch = e.touches[0];
            let newHeight = (touch.clientY / window.innerHeight) * 100;
            if (newHeight > 15 && newHeight < 85) videoBox.style.height = newHeight + 'vh';
        }

        function resizeStop() {
            dragAxis.classList.remove('dragging');
            document.removeEventListener('mousemove', resizeUpdate);
            document.removeEventListener('mouseup', resizeStop);
        }

        function resizeStopTouch() {
            dragAxis.classList.remove('dragging');
            document.removeEventListener('touchmove', resizeUpdateTouch);
            document.removeEventListener('touchend', resizeStopTouch);
        }


        // ==========================================
        // 功能二：字幕資料與控制核心
        // ==========================================
        const lyricsData = [
            { time: 0, text: "（音樂前奏）" },
            { time: 4.5, text: "點擊任意一行中文字幕..." },
            { time: 9.0, text: "時間軸就會自動跳轉到該時間開始跑！" },
            { time: 14.2, text: "上方加大了解析條，手機或電腦都更容易拉動" },
            { time: 18.5, text: "右側新增了 A+ 與 A- 可以自由調整字體大小" },
            { time: 23.0, text: "現在點擊這一行看看效果吧" },
            { time: 28.0, text: "（歌曲結束）" }
        ];

        let currentTime = 0;
        let isPlaying = false;
        let timerInterval = null;
        let currentFontSize = 1.3; // 初始 1.3rem

        const lyricsContainer = document.getElementById('lyricsContainer');
        const btnPlayPause = document.getElementById('btnPlayPause');
        const btnMinus = document.getElementById('btnMinus');
        const btnPlus = document.getElementById('btnPlus');
        const btnReset = document.getElementById('btnReset');
        const timeDisplay = document.getElementById('timeDisplay');
        const btnFontUp = document.getElementById('btnFontUp');
        const btnFontDown = document.getElementById('btnFontDown');

        // 渲染字幕並綁定點擊事件
        lyricsData.forEach((item) => {
            const p = document.createElement('p');
            p.className = 'lyric-line';
            p.innerText = item.text;
            
            // 【新增功能】點擊或觸控字幕事件
            const jumpToThisLyric = () => {
                currentTime = item.time; // 跳轉到該句時間
                updateUI(true); // 強制更新界面並滾動
            };
            p.addEventListener('click', jumpToThisLyric);
            
            lyricsContainer.appendChild(p);
        });

        const lyricElements = document.querySelectorAll('.lyric-line');

        // 更新 UI
        function updateUI(forceScroll = false) {
            let mins = Math.floor(currentTime / 60).toString().padStart(2, '0');
            let secs = Math.floor(currentTime % 60).toString().padStart(2, '0');
            let ms = Math.floor((currentTime % 1) * 10);
            timeDisplay.innerText = `${mins}:${secs}.${ms}`;

            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            if (activeIndex !== -1) {
                lyricElements.forEach((el, index) => {
                    if (index === activeIndex) {
                        // 如果是新高亮，或是被強制觸發（點擊字幕時）就滾動
                        if (!el.classList.contains('active') || forceScroll) {
                            el.classList.add('active');
                            const containerHeight = lyricsContainer.clientHeight;
                            lyricsContainer.
