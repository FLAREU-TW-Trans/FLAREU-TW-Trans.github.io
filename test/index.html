<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上下可調比例 - 手動同步字幕播放器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none; /* 防止拖曳時選取到文字 */
        }

        /* 上半邊：影片區塊 */
        .video-box {
            height: 50vh; /* 初始高度各佔一半 */
            min-height: 100px;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 核心：可拖曳的分隔調整軸 */
        .resizer {
            height: 8px;
            background-color: #333;
            cursor: ns-resize; /* 顯示上下調整的滑鼠游標 */
            transition: background-color 0.2s;
            position: relative;
            z-index: 10;
        }

        .resizer:hover, .resizer.dragging {
            background-color: #ff9800; /* 懸停或拖曳時變亮橘色 */
        }

        /* 下半邊：字幕與控制區容器 */
        .bottom-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #181818;
            overflow: hidden;
            min-height: 150px;
        }

        /* 控制面板 */
        .control-panel {
            background-color: #222;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            border-bottom: 1px solid #333;
        }

        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 0.9rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn:hover {
            background-color: #444;
        }

        .btn-main {
            background-color: #ff9800;
            color: black;
            font-weight: bold;
        }

        .btn-main:hover {
            background-color: #e68a00;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.1rem;
            min-width: 80px;
            text-align: center;
        }

        /* 字幕捲動區塊 */
        .lyrics-box {
            flex: 1;
            overflow-y: auto;
            position: relative;
            scroll-behavior: smooth;
            padding: 20vh 20px; /* 讓字幕在下方區塊中能保持居中 */
        }

        .lyrics-box::-webkit-scrollbar {
            width: 6px;
        }
        .lyrics-box::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }

        /* 單行字幕樣式 */
        .lyric-line {
            font-size: 1.3rem;
            line-height: 2.2;
            padding: 10px 0;
            text-align: center;
            color: #555;
            transition: all 0.2s ease;
            transform: scale(0.95);
            opacity: 0.4;
        }

        /* 當前字幕高亮 */
        .lyric-line.active {
            color: #ff9800;
            font-size: 1.6rem;
            font-weight: bold;
            transform: scale(1);
            opacity: 1;
            text-shadow: 0 0 10px rgba(255, 152, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="video-box" id="videoBox">
        <iframe src="https://www.mnetplus.world/media/zh-TW/videos/6a220a29568bf5527248b9d1" allowfullscreen></iframe>
    </div>

    <div class="resizer" id="dragAxis"></div>

    <div class="bottom-container">
        <div class="control-panel">
            <button class="btn" id="btnMinus">- 1 秒</button>
            <button class="btn btn-main" id="btnPlayPause">播放字幕</button>
            <button class="btn" id="btnPlus">+ 1 秒</button>
            <button class="btn" id="btnReset">重設</button>
            <div class="time-display" id="timeDisplay">00:00.0</div>
        </div>

        <div class="lyrics-box" id="lyricsContainer">
            </div>
    </div>

    <script>
        // ==========================================
        // 功能一：拖曳調整上下畫面大小
        // ==========================================
        const videoBox = document.getElementById('videoBox');
        const dragAxis = document.getElementById('dragAxis');

        dragAxis.addEventListener('mousedown', function(e) {
            e.preventDefault();
            dragAxis.classList.add('dragging');
            document.addEventListener('mousemove', resizeUpdate);
            document.addEventListener('mouseup', resizeStop);
        });

        function resizeUpdate(e) {
            // 計算滑鼠當前位置佔視窗高度的百分比，並轉為 vh 單位
            let newHeight = (e.clientY / window.innerHeight) * 100;
            
            // 設定限制限制，避免拉到最頂或最底不見
            if (newHeight > 15 && newHeight < 85) {
                videoBox.style.height = newHeight + 'vh';
            }
        }

        function resizeStop() {
            dragAxis.classList.remove('dragging');
            document.removeEventListener('mousemove', resizeUpdate);
            document.removeEventListener('mouseup', resizeStop);
        }


        // ==========================================
        // 功能二：字幕資料與手動計時器
        // ==========================================
        // 請在此填入你的中文字幕與時間點 (單位：秒)
        const lyricsData = [
            { time: 0, text: "（音樂前奏）" },
            { time: 4.5, text: "這是手動計時字幕的第一句" },
            { time: 9.0, text: "點擊上方的「播放字幕」，時間就會開始跑" },
            { time: 14.2, text: "如果發現字幕比影片快或慢" },
            { time: 18.5, text: "可以使用 ＋1秒 或 －1秒 按鈕來微調" },
            { time: 23.0, text: "中間的橘色軸線可以自由上下拖曳調整大小" },
            { time: 28.0, text: "（歌曲結束）" }
        ];

        let currentTime = 0;
        let isPlaying = false;
        let timerInterval = null;

        const lyricsContainer = document.getElementById('lyricsContainer');
        const btnPlayPause = document.getElementById('btnPlayPause');
        const btnMinus = document.getElementById('btnMinus');
        const btnPlus = document.getElementById('btnPlus');
        const btnReset = document.getElementById('btnReset');
        const timeDisplay = document.getElementById('timeDisplay');

        // 渲染字幕到網頁上
        lyricsData.forEach((item) => {
            const p = document.createElement('p');
            p.className = 'lyric-line';
            p.innerText = item.text;
            lyricsContainer.appendChild(p);
        });

        const lyricElements = document.querySelectorAll('.lyric-line');

        // 更新時間顯示與滾動高亮
        function updateUI() {
            // 格式化時間為 MM:SS.m
            let mins = Math.floor(currentTime / 60).toString().padStart(2, '0');
            let secs = Math.floor(currentTime % 60).toString().padStart(2, '0');
            let ms = Math.floor((currentTime % 1) * 10);
            timeDisplay.innerText = `${mins}:${secs}.${ms}`;

            // 尋找當前該高亮的字幕
            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) {
                    activeIndex = i;
                } else {
                    break;
                }
            }

            // 執行滾動與變色
            if (activeIndex !== -1) {
                lyricElements.forEach((el, index) => {
                    if (index === activeIndex) {
                        if (!el.classList.contains('active')) {
                            el.classList.add('active');
                            // 滾動置中
                            const containerHeight = lyricsContainer.clientHeight;
                            lyricsContainer.scrollTop = el.offsetTop - (containerHeight / 2) + (el.clientHeight / 2);
                        }
                    } else {
                        el.classList.remove('active');
                    }
                });
            }
        }

        // 控制：播放與暫停
        btnPlayPause.addEventListener('click', () => {
            if (isPlaying) {
                // 轉為暫停
                clearInterval(timerInterval);
                btnPlayPause.innerText = "播放字幕";
                btnPlayPause.style.backgroundColor = "#ff9800";
            } else {
                // 轉為播放 (每 100 毫秒增加 0.1 秒)
                timerInterval = setInterval(() => {
                    currentTime += 0.1;
                    updateUI();
                }, 100);
                btnPlayPause.innerText = "暫停字幕";
                btnPlayPause.style.backgroundColor = "#e0e0e0";
            }
            isPlaying = !isPlaying;
        });

        // 控制：微調時間 -1 秒
        btnMinus.addEventListener('click', () => {
            currentTime = Math.max(0, currentTime - 1);
            updateUI();
        });

        // 控制：微調時間 +1 秒
        btnPlus.addEventListener('click', () => {
            currentTime += 1;
            updateUI();
        });

        // 控制：重設歸零
        btnReset.addEventListener('click', () => {
            clearInterval(timerInterval);
            isPlaying = false;
            currentTime = 0;
            btnPlayPause.innerText = "播放字幕";
            btnPlayPause.style.backgroundColor = "#ff9800";
            updateUI();
            lyricsContainer.scrollTop = 0;
            lyricElements.forEach(el => el.classList.remove('active'));
        });

        // 初始執行一次確保畫面正確
        updateUI();
    </script>
</body>
</html>
