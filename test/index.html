<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select: none">
    <title>多模式字幕播放器</title>
    <style>
        /* 基礎樣式重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Microsoft JhengHei', sans-serif;
            background-color: #121212;
            color: #ffffff;
        }

        /* 預設為全螢幕 Flex 佈局（透過 class 控制上下或左右） */
        body {
            display: flex;
            transition: flex-direction 0.3s ease;
        }

        /* 【模式一】上下排版樣式 */
        body.mode-vertical {
            flex-direction: column;
        }
        body.mode-vertical .video-box {
            width: 100%;
            height: 40%; /* 初始高度佔 40% */
            min-height: 150px;
            max-height: 80vh;
        }
        body.mode-vertical .resizer-container {
            height: 35px; /* 超大觸控感應區 */
            width: 100%;
            cursor: ns-resize;
            border-top: 1px solid #333;
            border-bottom: 1px solid #333;
        }
        body.mode-vertical .resizer-line {
            width: 70px; height: 6px;
        }

        /* 【模式二】左右排版樣式 */
        body.mode-horizontal {
            flex-direction: row;
        }
        body.mode-horizontal .video-box {
            height: 100%;
            width: 50%; /* 初始寬度佔 50% */
            min-width: 200px;
            max-width: 80vw;
        }
        body.mode-horizontal .resizer-container {
            width: 35px; /* 超大觸控感應區 */
            height: 100%;
            cursor: ew-resize;
            border-left: 1px solid #333;
            border-right: 1px solid #333;
        }
        body.mode-horizontal .resizer-line {
            width: 6px; height: 70px;
        }

        /* 影片區塊 */
        .video-box {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 調整軸容器 */
        .resizer-container {
            background-color: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            touch-action: none;
            flex-shrink: 0;
        }

        .resizer-line {
            background-color: #555;
            border-radius: 3px;
            transition: background-color 0.2s;
        }

        .resizer-container:hover .resizer-line, 
        .resizer-container.dragging .resizer-line {
            background-color: #ff9800;
        }

        /* 下方/右方 內容整合容器 */
        .bottom-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #181818;
            overflow: hidden;
        }

        /* 【全部按鈕變大】控制面板樣式 */
        .control-panel {
            flex-shrink: 0;
            background-color: #222;
            padding: 15px; /* 加大內距 */
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px; /* 加大間距 */
            border-bottom: 1px solid #333;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        /* 大按鈕設定 */
        .btn {
            background-color: #333;
            color: white;
            border: none;
            padding: 12px 20px; /* 大幅增加點擊面積 */
            font-size: 18px; /* 字體變大 */
            font-weight: bold;
            border-radius: 8px; /* 圓角變大更美觀 */
            cursor: pointer;
            transition: background 0.1s, transform 0.1s;
        }

        .btn:active {
            background-color: #444;
            transform: scale(0.95); /* 點擊動態回饋 */
        }

        .btn-main {
            background-color: #ff9800;
            color: black;
        }
        
        .btn-mode {
            background-color: #0076ff; /* 模式切換鈕用藍色醒目提示 */
        }

        /* 大時間顯示 */
        .time-display {
            font-family: monospace;
            font-size: 24px; /* 時間顯示變大 */
            font-weight: bold;
            min-width: 110px;
            text-align: center;
            color: #ff9800;
        }

        /* 字幕捲動區塊 */
        .lyrics-box {
            flex: 1;
            overflow-y: scroll;
            -webkit-overflow-scrolling: touch;
            position: relative;
            scroll-behavior: smooth;
            /* 【優化】上方 Padding 縮小(10vh)，下方加大(40vh)，讓字幕整體偏上 */
            padding: 10vh 20px 40vh 20px; 
            width: 100%;
        }

        .lyrics-box::-webkit-scrollbar { width: 6px; }
        .lyrics-box::-webkit-scrollbar-thumb { background: #3b3b3b; border-radius: 3px; }

        /* 字幕單行樣式 */
        .lyric-line {
            font-size: var(--lyric-font-size, 22px); /* 預設基礎字體變大 (22px) */
            line-height: 1.8;
            padding: 18px 0; /* 加大間距好點擊 */
            text-align: center;
            color: #555;
            transition: color 0.2s, font-size 0.2s, opacity 0.2s;
            cursor: pointer;
            width: 100%;
            word-wrap: break-word;
        }

        /* 當前高亮字幕 */
        .lyric-line.active {
            color: #ff9800;
            font-size: calc(var(--lyric-font-size, 22px) + 8px); /* 高亮放大更多 */
            font-weight: bold;
            opacity: 1;
            text-shadow: 0 0 15px rgba(255, 152, 0, 0.5);
        }

        /* 拖曳時全螢幕的滑鼠樣式限制 */
        .dragging-v { cursor: ns-resize; user-select: none; -webkit-user-select: none; }
        .dragging-h { cursor: ew-resize; user-select: none; -webkit-user-select: none; }
    </style>
</head>

        <div class="lyrics-box" id="lyricsContainer"></div>
    </div>
