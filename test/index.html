<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select: none">
    <title>智慧同步播放器 - 終極相容版</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        html, body { height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; background-color: #121212; color: #ffffff; }
        
        /* 基礎佈局 */
        body { display: flex; }
        
        /* 上下模式 */
        body.mode-vertical { flex-direction: column; }
        body.mode-vertical .video-box { width: 100%; height: 40vh; min-height: 100px; }
        body.mode-vertical .resizer-container { height: 35px; width: 100%; cursor: ns-resize; border-top: 1px solid #333; border-bottom: 1px solid #333; }
        body.mode-vertical .resizer-line { width: 70px; height: 6px; }

        /* 左右模式 */
        body.mode-horizontal { flex-direction: row; }
        body.mode-horizontal .video-box { height: 100%; width: 50vw; min-width: 100px; }
        body.mode-horizontal .resizer-container { width: 35px; height: 100%; cursor: ew-resize; border-left: 1px solid #333; border-right: 1px solid #333; }
        body.mode-horizontal .resizer-line { width: 6px; height: 70px; }

        .video-box { background-color: #000; flex-shrink: 0; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* 核心修正：防止拖曳時滑鼠進到 iframe 導致事件中斷 */
        .video-box.iframe-disabled::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        
        .resizer-container { background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; z-index: 1000; touch-action: none; flex-shrink: 0; }
        .resizer-line { background-color: #555; border-radius: 3px; }
        .resizer-container:hover .resizer-line, .resizer-container.dragging .resizer-line { background-color: #ff9800; }

        .bottom-container { flex: 1; display: flex; flex-direction: column; background-color: #181818; overflow: hidden; }
        .control-panel { 
            flex-shrink: 0; 
            background-color: #222; 
            padding: calc(16px * var(--ui-scale)); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            flex-wrap: wrap; 
            gap: calc(16px * var(--ui-scale)); 
            border-bottom: 1px solid #333; 
        }
        .btn-group { 
            display: flex; 
            gap: calc(10px * var(--ui-scale)); 
            align-items: center; 
            flex-wrap: wrap; 
            justify-content: center; 
        }
        
        /* 大按鈕改進 */
        .btn { 
            background-color: #333; 
            color: white; 
            border: none; 
            padding: calc(14px * var(--ui-scale)) calc(22px * var(--ui-scale)); 
            font-size: calc(18px * var(--ui-scale)); 
            font-weight: bold; 
            border-radius: calc(10px * var(--ui-scale)); 
            cursor: pointer; 
            min-height: calc(52px * var(--ui-scale)); 
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn:active { background-color: #444; }
        .btn-main { background-color: #ff9800; color: black; }
        .btn-mode { background-color: #0076ff; }
        .btn-scale { background-color: #e91e63; color: white; }
        .time-display { 
            font-family: monospace; 
            font-size: calc(26px * var(--ui-scale)); 
            font-weight: bold; 
            min-width: calc(120px * var(--ui-scale)); 
            text-align: center; 
            color: #ff9800; 
        }
        
        /* 字幕重心上移優化 */
        .lyrics-box { flex: 1; overflow-y: auto; position: relative; scroll-behavior: smooth; padding: 10vh 20px 45vh 20px; width: 100%; }
        .lyric-line { font-size: var(--lyric-font-size); line-height: 1.8; padding: 18px 0; text-align: center; color: #555; cursor: pointer; width: 100%; word-wrap: break-word; }
        .lyric-line.active { color: #ff9800; font-size: calc(var(--lyric-font-size) + 8px); font-weight: bold; text-shadow: 0 0 15px rgba(255, 152, 0, 0.5); }

        @media (max-width: 768px) {
            .control-panel {
                display: grid !important; 
                grid-template-columns: repeat(4, 1fr) !important; 
                gap: calc(10px * var(--ui-scale)) !important;
                padding: calc(12px * var(--ui-scale)) !important;
            }
            .btn-group { display: contents !important; }
            .btn { width: 100% !important; height: calc(60px * var(--ui-scale)) !important; padding: 0 !important; }
            .btn-mode { grid-column: span 2 !important; } 
            .time-display { 
                grid-column: span 2 !important; 
                background-color: #1a1a1a !important;
                display: flex !important;
                align-items: center !important;
                justify-content: center !important;
                height: calc(60px * var(--ui-scale)) !important;
            }
            #btnMinus { grid-column: span 1 !important; }
            #btnPlayPause { grid-column: span 2 !important; }
            #btnPlus { grid-column: span 1 !important; }
            #btnReset { grid-column: span 2 !important; }
            #btnFontDown { grid-column: span 1 !important; }
            #btnFontUp { grid-column: span 1 !important; }
        }
    </style>
</head>
<body class="mode-vertical"> <div class="video-box" id="videoBox">
        <iframe src="https://www.mnetplus.world/media/zh-TW/videos/6a220a29568bf5527248b9d1"></iframe>
    </div>

    <div class="resizer-container" id="dragAxis">
        <div class="resizer-line"></div>
    </div>

    <div class="bottom-container">
        <div class="control-panel">
            <button class="btn btn-mode" id="btnToggleMode">⇄ 切換左右畫面</button>
            <button class="btn btn-scale" id="btnUiDown">按鈕－</button>
            <button class="btn btn-scale" id="btnUiUp">按鈕＋</button>
            <div class="btn-group">
                <button class="btn" id="btnMinus">-1s</button>
                <button class="btn btn-main" id="btnPlayPause">▶ 播放字幕</button>
                <button class="btn" id="btnPlus">+1s</button>
            </div>
            <div class="time-display" id="timeDisplay">00:00.0</div>
            <div class="btn-group">
                <button class="btn" id="btnReset">重設</button>
                <button class="btn" id="btnFontDown">A-</button>
                <button class="btn" id="btnFontUp">A+</button>
            </div>
        </div>
        <div class="lyrics-box" id="lyricsContainer"></div>
    </div>

    <script>
        // 移除 DOMContentLoaded，直接最速執行執行，防止被跨域 iframe 阻斷
        const body = document.body;
        const btnToggleMode = document.getElementById('btnToggleMode');
        const videoBox = document.getElementById('videoBox');
        const dragAxis = document.getElementById('dragAxis');
        const lyricsContainer = document.getElementById('lyricsContainer');
        const timeDisplay = document.getElementById('timeDisplay');
        const btnPlayPause = document.getElementById('btnPlayPause');

        let isVerticalMode = true;
        let isDragging = false;
        let startPos = 0;
        let startSize = 0;

        // 【核心縮放邏輯】控制動態 CSS 全域變數
        let currentUiScale = 1.0; 
        function changeUiScale(amount) {
            // 限制縮放範圍在 0.6 倍 到 3.0 倍之間，防止畫面爆掉
            currentUiScale = Math.max(0.6, Math.min(3.0, currentUiScale + amount));
            document.documentElement.style.setProperty('--ui-scale', currentUiScale);
            updateUI(true);
        }
        document.getElementById('btnUiUp').onclick = () => changeUiScale(0.2);   // 每次放大 0.2 倍
        document.getElementById('btnUiDown').onclick = () => changeUiScale(-0.2); // 每次縮小 0.2 倍

        // 1. 模式切換功能
        btnToggleMode.onclick = function() {
            videoBox.style.width = '';
            videoBox.style.height = '';
            if (isVerticalMode) {
                body.className = 'mode-horizontal';
                btnToggleMode.innerText = "⇄ 切換上下畫面";
            } else {
                body.className = 'mode-vertical';
                btnToggleMode.innerText = "⇄ 切換左右畫面";
            }
            isVerticalMode = !isVerticalMode;
            updateUI(true);
        };

        // 2. 高相容智慧拖曳邏輯
        function onStart(pos) {
            isDragging = true;
            startPos = pos;
            startSize = isVerticalMode ? videoBox.offsetHeight : videoBox.offsetWidth;
            dragAxis.classList.add('dragging');
            videoBox.classList.add('iframe-disabled'); // 拖曳時啟用遮罩，防止滑鼠事件被 iframe 吃掉
        }
        
        function onMove(pos) {
            if (!isDragging) return;
            let delta = pos - startPos;
            let newSize = startSize + delta;
            if (isVerticalMode) {
                if (newSize >= 80 && newSize <= window.innerHeight * 0.9) videoBox.style.height = newSize + 'px';
            } else {
                if (newSize >= 80 && newSize <= window.innerWidth * 0.9) videoBox.style.width = newSize + 'px';
            }
        }
        
        function onEnd() { 
            if (isDragging) { 
                isDragging = false; 
                dragAxis.classList.remove('dragging'); 
                videoBox.classList.remove('iframe-disabled');
            } 
        }

        // 電腦事件
        dragAxis.addEventListener('mousedown', e => onStart(isVerticalMode ? e.clientY : e.clientX));
        document.addEventListener('mousemove', e => onMove(isVerticalMode ? e.clientY : e.clientX));
        document.addEventListener('mouseup', onEnd);

        // 手機事件
        dragAxis.addEventListener('touchstart', e => onStart(isVerticalMode ? e.touches[0].clientY : e.touches[0].clientX), { passive: true });
        document.addEventListener('touchmove', e => { if (isDragging) { if(e.cancelable) e.preventDefault(); onMove(isVerticalMode ? e.touches[0].clientY : e.touches[0].clientX); } }, { passive: false });
        document.addEventListener('touchend', onEnd);

        // 3. 字幕資料與渲染
        const lyricsData = [
            { time: 0, text: "【系統提示】終極相容版已成功載入！" },
            { time: 3.0, text: "點擊任意一行中文字幕即可精準跳轉時間。" },
            { time: 7.0, text: "點擊播放按鈕，字幕會開始向上同步跑動。" },
            { time: 12.0, text: "按住中間灰色橫條，在電腦或手機上皆能自由拖曳。" },
            { time: 17.0, text: "所有的控制按鈕均已放大，方便進行觸控與點擊。" },
            { time: 22.0, text: "（測試結束，可開始替換你所需的歌詞與時間軸）" }
        ];

        let currentTime = 0;
        let isPlaying = false;
        let timerInterval = null;
        let currentFontSize = 22;

        // 渲染字幕到畫面上
        lyricsData.forEach(item => {
            const p = document.createElement('p');
            p.className = 'lyric-line';
            p.innerText = item.text;
            p.onclick = function() { currentTime = item.time; updateUI(true); };
            lyricsContainer.appendChild(p);
        });

        const lyricElements = document.querySelectorAll('.lyric-line');

        // 4. UI 刷新與偏上滾動對齊
        function updateUI(forceScroll = false) {
            let mins = Math.floor(currentTime / 60).toString().padStart(2, '0');
            let secs = Math.floor(currentTime % 60).toString().padStart(2, '0');
            let ms = Math.floor((currentTime % 1) * 10);
            timeDisplay.innerText = `${mins}:${secs}.${ms}`;

            let activeIndex = -1;
            for (let i = 0; i < lyricsData.length; i++) {
                if (currentTime >= lyricsData[i].time) activeIndex = i;
                else break;
            }

            if (activeIndex !== -1 && lyricElements[activeIndex]) {
                const currentEl = lyricElements[activeIndex];
                if (!currentEl.classList.contains('active') || forceScroll) {
                    lyricElements.forEach(el => el.classList.remove('active'));
                    currentEl.classList.add('active');
                    // 減去 4.5 分之一的高度，強迫其固定偏向上方顯示
                    lyricsContainer.scrollTop = currentEl.offsetTop - (lyricsContainer.clientHeight / 4.5);
                }
            } else if (currentTime === 0) {
                lyricElements.forEach(el => el.classList.remove('active'));
                lyricsContainer.scrollTop = 0;
            }
        }

        // 按鈕控制
        btnPlayPause.onclick = function() {
            if (isPlaying) {
                clearInterval(timerInterval);
                btnPlayPause.innerText = "▶ 播放字幕";
            } else {
                timerInterval = setInterval(() => { currentTime += 0.1; updateUI(); }, 100);
                btnPlayPause.innerText = "設 ⏸ 暫停字幕";
            }
            isPlaying = !isPlaying;
        };

        document.getElementById('btnMinus').onclick = function() { currentTime = Math.max(0, currentTime - 1); updateUI(true); };
        document.getElementById('btnPlus').onclick = function() { currentTime += 1; updateUI(true); };
        document.getElementById('btnReset').onclick = function() { currentTime = 0; if(isPlaying) btnPlayPause.click(); updateUI(true); };

        function changeFont(amount) {
            currentFontSize = Math.max(14, Math.min(45, currentFontSize + amount));
            document.documentElement.style.setProperty('--lyric-font-size', currentFontSize + 'px');
            updateUI(true);
        }
        document.getElementById('btnFontUp').onclick = () => changeFont(2);
        document.getElementById('btnFontDown').onclick = () => changeFont(-2);

        // 初始首次執行
        updateUI();
    </script>
</body>
</html>
