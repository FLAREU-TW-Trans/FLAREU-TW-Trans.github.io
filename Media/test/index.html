<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>崔立于 官方影片中文字幕同步觀看站</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: #1e293b;
            --accent-color: #38bdf8;
            --accent-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background-color: var(--panel-bg);
            padding: 15px 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--accent-color);
        }

        /* 左右雙視窗佈局 */
        .main-container {
            flex: 1;
            display: flex;
            flex-direction: row;
            overflow: hidden;
        }

        /* 左側：官方影片導流區 */
        .left-panel {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-right: 1px solid #334155;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        .video-btn {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            padding: 25px 30px;
            background-color: #ef4444;
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(239, 68, 68, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .video-btn:hover {
            background-color: #dc2626;
            transform: translateY(-3px);
            box-shadow: 0 15px 30px -5px rgba(239, 68, 68, 0.6);
        }

        .instructions {
            max-width: 400px;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .instructions h3 {
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .instructions ol {
            padding-left: 20px;
        }

        .instructions li {
            margin-bottom: 8px;
        }

        /* 右側：動態字幕滾動區 */
        .right-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            background-color: #0b0f19;
            position: relative;
        }

        /* 控制列 */
        .controls {
            padding: 20px;
            background-color: var(--panel-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            border-bottom: 1px solid #334155;
            flex-wrap: wrap;
        }

        .time-display {
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--accent-color);
            margin-right: 15px;
            background-color: #0f172a;
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid #334155;
        }

        .ctrl-btn {
            padding: 10px 18px;
            font-size: 0.95rem;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--accent-color); color: #0f172a; }
        .btn-primary:hover { background-color: #7dd3fc; }
        .btn-secondary { background-color: #475569; color: white; }
        .btn-secondary:hover { background-color: #64748b; }

        /* 字幕滾動視窗 */
        .subtitle-container {
            flex: 1;
            overflow-y: auto;
            padding: 200px 40px; /* 上下留白讓當前字幕能保持在中間 */
            scroll-behavior: smooth;
            text-align: center;
        }

        /* 隱藏捲動條但保有功能 */
        .subtitle-container::-webkit-scrollbar {
            width: 6px;
        }
        .subtitle-container::-webkit-scrollbar-thumb {
            background-color: #334155;
            border-radius: 3px;
        }

        .subtitle-line {
            padding: 15px 10px;
            font-size: 1.15rem;
            color: var(--text-muted);
            transition: all 0.3s ease;
            transform: scale(0.95);
            opacity: 0.4;
            cursor: pointer;
        }

        .subtitle-line:hover {
            opacity: 0.7;
        }

        /* 高亮當前播放的字幕 */
        .subtitle-line.active {
            color: var(--text-main);
            font-size: 1.55rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            opacity: 1;
            transform: scale(1);
        }

        /* 響應式佈局：當螢幕太小時改為上下排列 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .left-panel {
                border-right: none;
                border-bottom: 1px solid #334155;
                padding: 20px;
            }
            .video-btn {
                padding: 15px 20px;
                font-size: 1.1rem;
                margin-bottom: 15px;
            }
            .subtitle-container {
                padding: 100px 20px;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>崔立于 台灣翻譯站 ｜ 專屬同步字幕播放器</h1>
    </header>

    <div class="main-container">
        
        <!-- 左側面板：引導按鈕 -->
        <div class="left-panel">
            <a href="https://www.muniverse.io/titles/23fd787d-761c-4d43-ad2e-2fa34cd27b39?defaultTab=vod_season&seasonCode=2fb6ff42-f791-4544-b6ee-35b0f340711a" 
               target="_blank" 
               class="video-btn">
               🎬 點我打開官方原片網頁
            </a>
            
            <div class="instructions">
                <h3>💡 使用說明：</h3>
                <ol>
                    <li>點擊上方紅色按鈕，將會在<b>新分頁</b>開啟官方影片。</li>
                    <li>建議將瀏覽器視窗「左右並排」，一邊放影片，一邊放本站字幕。</li>
                    <li>在官方影片按下播放的<b>同一個瞬間</b>，點擊右邊的「開始同步」按鈕。</li>
                    <li>如果時間沒對準，可以使用「微調」按鈕來手動校正喔！</li>
                </ol>
            </div>
        </div>

        <!-- 右側面板：歌詞式動態字幕 -->
        <div class="right-panel">
            
            <!-- 控制列 -->
            <div class="controls">
                <div class="time-display" id="timeDisplay">00:00.0</div>
                <button class="ctrl-btn btn-primary" id="startBtn" onclick="togglePlay()">開始同步</button>
                <button class="ctrl-btn btn-secondary" onclick="resetTimer()">重設</button>
                <button class="ctrl-btn btn-secondary" onclick="adjustTime(-0.5)">⏪ 微調 -0.5s</button>
                <button class="ctrl-btn btn-secondary" onclick="adjustTime(0.5)">微調 +0.5s ⏩</button>
            </div>

            <!-- 字幕顯示區 -->
            <div class="subtitle-container" id="subtitleContainer">
                <!-- 字幕會由 JavaScript 動態渲染進來 -->
            </div>

        </div>

    </div>

    <script>
        // 這裡放你的字幕資料，格式為 [秒數, "字幕文字"]
        // 未來要更新字幕，只要按照順序修改/增加這個陣列即可
        const subtitleData = [
            [0.0, "（片頭音樂起）"],
            [2.5, "立于：大家好！我是崔立于。"],
            [5.0, "玗進：Lobudan 們好久不見，我是玗進。"],
            [8.2, "立于：這次能透過全新的平台和大家見面，真的非常開心！"],
            [12.7, "玗進：沒錯，聽說今天製作組準備了非常厲害的特別企劃？"],
            [16.4, "立于：喔？我有聽說！好像跟我們上次去楊平旅行有關..."],
            [20.1, "玗進：哇，真的嗎？那我現在就已經開始期待了！"],
            [24.5, "立于：大家也要跟著我們一起看到最後喔，那我們出發吧！"],
            [29.0, "（畫面切換，出發前往目的地）"],
            [35.0, "立于：這裡的風景真的不是開玩笑的，空氣超棒。"],
            [40.5, "玗進：哥，你看那邊！那是不是我們等等要挑戰的地方？"],
            [45.0, "（測試字幕結束，你可以自行增加更多行數...）"]
        ];

        let currentTime = 0;
        let isPlaying = false;
        let timerInterval = null;
        let activeIndex = -1;

        const timeDisplay = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');
        const subtitleContainer = document.getElementById('subtitleContainer');

        // 渲染字幕到網頁上
        function renderSubtitles() {
            subtitleContainer.innerHTML = '';
            subtitleData.forEach((data, index) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'subtitle-line';
                lineDiv.id = `line-${index}`;
                lineDiv.innerText = data[1];
                
                // 讓粉絲也可以直接點擊該行字幕，手動跳轉到那個時間點
                lineDiv.onclick = () => {
                    seekTo(data[0]);
                };
                
                subtitleContainer.appendChild(lineDiv);
            });
        }

        // 開始 / 暫停 控制
        function togglePlay() {
            if (isPlaying) {
                // 暫停
                clearInterval(timerInterval);
                startBtn.innerText = "繼續同步";
                startBtn.style.backgroundColor = "var(--accent-color)";
                isPlaying = false;
            } else {
                // 開始
                const startTime = Date.now() - (currentTime * 1000);
                timerInterval = setInterval(() => {
                    currentTime = (Date.now() - startTime) / 1000;
                    updateUI();
                }, 100); // 每 0.1 秒更新一次
                
                startBtn.innerText = "暫停同步";
                startBtn.style.backgroundColor = "#e2e8f0";
                startBtn.style.color = "#0f172a";
                isPlaying = true;
            }
        }

        // 重設計時器
        function resetTimer() {
            clearInterval(timerInterval);
            currentTime = 0;
            activeIndex = -1;
            isPlaying = false;
            startBtn.innerText = "開始同步";
            startBtn.style.backgroundColor = "var(--accent-color)";
            startBtn.style.color = "#0f172a";
            updateUI();
            
            // 滾回最上方
            subtitleContainer.scrollTop = 0;
            
            // 移除所有高亮
            const actives = document.querySelectorAll('.subtitle-line.active');
            actives.forEach(el => el.classList.remove('active'));
        }

        // 微調時間 (+ 或 -)
        function adjustTime(amount) {
            currentTime += amount;
            if (currentTime < 0) currentTime = 0;
            
            // 如果正在播放，需要重置定時器的基準時間
            if (isPlaying) {
                togglePlay();
                togglePlay();
            } else {
                updateUI();
            }
        }

        // 點擊字幕跳轉時間
        function seekTo(seconds) {
            currentTime = seconds;
            if (isPlaying) {
                togglePlay();
                togglePlay();
            } else {
                updateUI();
            }
        }

        // 更新時間顯示與字幕高亮滾動
        function updateUI() {
            // 格式化時間顯示分:秒.毫秒 (MM:SS.m)
            const minutes = Math.floor(currentTime / 60);
            const seconds = Math.floor(currentTime % 60);
            const ms = Math.floor((currentTime % 1) * 10);
            timeDisplay.innerText = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}.${ms}`;

            // 尋找目前時間應該高亮哪一行字幕
            let targetIndex = -1;
            for (let i = 0; i < subtitleData.length; i++) {
                if (currentTime >= subtitleData[i][0]) {
                    targetIndex = i;
                } else {
                    break;
                }
            }

            // 如果行數有變更，執行高亮與自動滾動
            if (targetIndex !== activeIndex && targetIndex !== -1) {
                // 移除舊的高亮
                if (activeIndex !== -1) {
                    const oldLine = document.getElementById(`line-${activeIndex}`);
                    if (oldLine) oldLine.classList.remove('active');
                }

                // 加上新的高亮
                const newLine = document.getElementById(`line-${targetIndex}`);
                if (newLine) {
                    newLine.classList.add('active');
                    
                    // 自動滾動到容器中央
                    newLine.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center'
                    });
                }
                activeIndex = targetIndex;
            }
        }

        // 初始化渲染
        renderSubtitles();
    </script>
</body>
</html>
